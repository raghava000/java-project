name: Project 1 - Java Modernization

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ secrets.WIF_PROVIDER_NAME }}
        service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: SonarQube Scan
      run: |
        mvn sonar:sonar \
          -Dsonar.projectKey=java-modernization \
          -Dsonar.host.url=http://${{ secrets.SONAR_HOST_IP }}:9000 \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}

    - name: Docker Auth and Build
      run: |
        gcloud auth configure-docker asia-south1-docker.pkg.dev
        docker build -t asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/java-project/java-app:${{ github.sha }} .
        docker push asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/java-project/java-app:${{ github.sha }}

    - name: Get GKE Credentials
      uses: google-github-actions/get-gke-credentials@v2
      with:
        # REPLACE THIS WITH YOUR ACTUAL CLUSTER NAME
        cluster_name: standard-cluster
        location: us-central1-a

    - name: Kubernetes Deploy
      run: |
        # Update the image tag dynamically
        sed -i "s|image:.*|image: asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/my-java-repo/java-app:${{ github.sha }}|g" deployment.yaml
        kubectl apply -f deployment.yaml
        kubectl apply -f service.yaml
